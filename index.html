<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<title>LocSnap – Location Camera</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-glow: rgba(0,229,160,0.25);
    --text: #f0f0f0;
    --text-dim: #888;
    --text-muted: #555;
    --red: #ff4d4d;
    --yellow: #ffd166;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  /* ── SCREENS ── */
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ── SPLASH ── */
  #splash { gap: 20px; text-align: center; }

  .logo-mark {
    width: 72px; height: 72px;
    background: var(--accent-dim);
    border: 1.5px solid var(--accent);
    border-radius: 20px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
    box-shadow: 0 0 32px var(--accent-glow);
  }
  .logo-mark svg { width: 36px; height: 36px; }

  .app-name {
    font-size: 28px; font-weight: 700; letter-spacing: -0.5px;
    color: var(--text);
  }
  .app-name span { color: var(--accent); }

  .tagline {
    font-size: 14px; color: var(--text-dim); line-height: 1.5;
    max-width: 260px; margin: 0 auto;
  }

  .perms-list {
    width: 100%; max-width: 320px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .perm-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }
  .perm-row:last-child { border-bottom: none; }
  .perm-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .perm-icon svg { width: 18px; height: 18px; stroke: var(--accent); }
  .perm-text { flex: 1; }
  .perm-label { font-size: 13px; font-weight: 600; }
  .perm-desc { font-size: 12px; color: var(--text-dim); margin-top: 2px; }

  /* ── CAMERA ── */
  #camera { padding: 0; }

  #video-wrap {
    position: relative; width: 100%; height: 100%;
    background: #000;
  }
  #video {
    width: 100%; height: 100%;
    object-fit: cover;
  }

  /* overlay grid lines */
  #video-wrap::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 33.33% 33.33%;
    pointer-events: none; z-index: 1;
  }

  .cam-top-bar {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 52px 20px 16px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
    z-index: 2;
    display: flex; align-items: flex-start; justify-content: space-between;
  }

  #location-badge {
    background: rgba(0,0,0,0.65);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 8px 12px;
    max-width: calc(100% - 60px);
  }
  .badge-coords {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.3px;
  }
  .badge-addr {
    font-size: 11px; color: rgba(255,255,255,0.75);
    margin-top: 3px; line-height: 1.4;
  }
  .badge-time {
    font-size: 10px; color: rgba(255,255,255,0.4);
    margin-top: 3px;
    font-family: 'JetBrains Mono', monospace;
  }

  .flip-btn {
    width: 42px; height: 42px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .flip-btn svg { width: 20px; height: 20px; stroke: #fff; }

  .cam-bottom-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 20px 32px 44px;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
    z-index: 2;
    display: flex; align-items: center; justify-content: center; gap: 48px;
  }

  .shutter {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: #fff;
    border: 3px solid rgba(255,255,255,0.3);
    box-shadow: 0 0 0 6px rgba(255,255,255,0.15);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    flex-shrink: 0;
  }
  .shutter:active { transform: scale(0.93); box-shadow: 0 0 0 3px rgba(255,255,255,0.1); }

  .side-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  .side-btn svg { width: 20px; height: 20px; stroke: #fff; }

  /* flash */
  #flash-overlay {
    position: absolute; inset: 0;
    background: #fff;
    opacity: 0; pointer-events: none;
    z-index: 10;
    transition: opacity 0.05s;
  }
  #flash-overlay.flash { opacity: 1; }

  /* ── PREVIEW ── */
  #preview {
    gap: 0; padding: 0;
    justify-content: flex-start;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .preview-header {
    width: 100%;
    padding: 52px 20px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .back-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
  }
  .back-btn svg { width: 18px; height: 18px; stroke: var(--text); }
  .preview-title { font-size: 17px; font-weight: 600; }

  .preview-img-wrap {
    width: 100%; flex-shrink: 0;
    position: relative;
  }
  #preview-canvas {
    width: 100%; display: block;
  }

  .preview-meta {
    width: 100%; padding: 20px 20px 8px; flex-shrink: 0;
  }
  .meta-row {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .meta-row:last-child { border-bottom: none; }
  .meta-icon { color: var(--accent); flex-shrink: 0; }
  .meta-icon svg { width: 16px; height: 16px; stroke: var(--accent); display: block; }
  .meta-key { font-size: 11px; color: var(--text-dim); width: 64px; flex-shrink: 0; }
  .meta-val {
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text); flex: 1;
  }

  .action-row {
    width: 100%; padding: 16px 20px;
    display: flex; gap: 10px; flex-shrink: 0;
  }

  /* ── BUTTONS ── */
  .btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 20px;
    border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 600;
    cursor: pointer; border: none;
    transition: opacity 0.15s, transform 0.1s;
    text-decoration: none;
  }
  .btn:active { opacity: 0.8; transform: scale(0.98); }
  .btn svg { width: 18px; height: 18px; stroke: currentColor; flex-shrink: 0; }

  .btn-primary {
    background: var(--accent);
    color: #000;
    flex: 1;
  }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    flex: 1;
  }
  .btn-full {
    width: 100%; margin: 0 20px;
    flex: unset;
  }

  .btn-start {
    width: 100%; max-width: 320px;
    background: var(--accent);
    color: #000;
    padding: 16px;
    border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 700;
    letter-spacing: 0.2px;
    box-shadow: 0 0 24px var(--accent-glow);
  }

  /* share grid */
  .share-grid {
    width: 100%; padding: 0 20px 16px;
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; flex-shrink: 0;
  }
  .share-btn {
    display: flex; align-items: center; gap: 10px;
    padding: 13px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }
  .share-btn:active { background: var(--surface2); border-color: var(--accent); }
  .share-btn-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
  }
  .share-btn-icon img { width: 34px; height: 34px; border-radius: 9px; object-fit: cover; }
  .share-btn-label { font-size: 13px; font-weight: 500; }

  .share-section-label {
    width: 100%; padding: 0 20px 10px;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.8px;
    text-transform: uppercase; flex-shrink: 0;
  }

  /* ── STATUS ── */
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 12px 20px 28px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    font-size: 13px; color: var(--text-dim);
    text-align: center; z-index: 100;
    transform: translateY(100%);
    transition: transform 0.3s ease;
  }
  #status-bar.show { transform: translateY(0); }
  #status-bar.error { color: var(--red); }

  /* loading spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block; vertical-align: middle; margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* GPS dot */
  .gps-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    margin-right: 6px;
    vertical-align: middle;
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  canvas { display: none; }
</style>
</head>
<body>

<!-- Hidden canvas for compositing -->
<canvas id="offscreen"></canvas>

<!-- ─── SPLASH ─── -->
<div class="screen active" id="splash">
  <div class="logo-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

<!-- ─── CAMERA ─── -->

</div>

<!-- ─── PREVIEW ─── -->

  <div class="preview-meta" id="meta-panel">
    <div class="meta-row">
      <div class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg></div>

    <div class="meta-row">

      <div class="meta-key">Maps</div>

    <div class="meta-row">
      <div class="meta-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>

    <div class="share-btn" data-app="messenger">

      </div>

    <div class="share-btn" data-app="instagram">

      </div>

    </div>

      <div class="share-btn-icon">

      </div>

</div>

<!-- Status bar -->
<div id="status-bar"></div>

<script>
// ── STATE ──
let stream = null;
let facingMode = 'environment';
let locationData = null;
let capturedBlob = null;
const video   = document.getElementById('video');
const offscreen = document.getElementById('offscreen');
const ctx = offscreen.getContext('2d');

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showStatus(msg, isError = false, duration = 3000) {
  const bar = document.getElementById('status-bar');
  bar.innerHTML = msg;
  bar.className = 'show' + (isError ? ' error' : '');
  if (duration) setTimeout(() => bar.classList.remove('show'), duration);
}

// ── START ──
document.getElementById('start-btn').addEventListener('click', async () => {
  await startCamera();
  startLocationWatch();
  showScreen('camera');
});

// ── CAMERA ──
async function startCamera() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    video.srcObject = stream;
  } catch (e) {
    showStatus('Camera access denied.', true, 5000);
  }
}

document.getElementById('flip-btn').addEventListener('click', () => {
  facingMode = facingMode === 'environment' ? 'user' : 'environment';
  startCamera();
});

document.getElementById('close-cam-btn').addEventListener('click', () => {
  if (stream) stream.getTracks().forEach(t => t.stop());
  showScreen('splash');
});

// ── LOCATION ──
function startLocationWatch() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(async pos => {
    const { latitude: lat, longitude: lon, accuracy } = pos.coords;
    const now = new Date();
    const timeStr = now.toLocaleString();

    document.getElementById('badge-coords').innerHTML =
      `<span class="gps-dot"></span>${lat.toFixed(5)}°, ${lon.toFixed(5)}°`;
    document.getElementById('badge-time').textContent = timeStr;

    // Reverse geocode
    let addr = `${lat.toFixed(4)}, ${lon.toFixed(4)}`;
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`);
      const d = await r.json();
      addr = d.display_name ? d.display_name.split(',').slice(0,3).join(', ') : addr;
    } catch(e) {}

    document.getElementById('badge-addr').textContent = addr;

    locationData = { lat, lon, accuracy, addr, timeStr };
  }, err => {
    document.getElementById('badge-coords').textContent = 'GPS unavailable';
  }, { enableHighAccuracy: true, maximumAge: 5000 });
}

// ── SHUTTER ──
document.getElementById('shutter-btn').addEventListener('click', capturePhoto);

async function capturePhoto() {
  if (!stream) return;
  // Flash effect
  const flash = document.getElementById('flash-overlay');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 120);

  const vw = video.videoWidth, vh = video.videoHeight;
  if (!vw || !vh) { showStatus('Camera not ready yet.', true); return; }

  offscreen.width = vw;
  offscreen.height = vh;
  ctx.drawImage(video, 0, 0, vw, vh);

  // Draw stamp
  drawStamp(ctx, vw, vh);

  // Show preview
  const previewCanvas = document.getElementById('preview-canvas');
  previewCanvas.width = vw;
  previewCanvas.height = vh;
  const pCtx = previewCanvas.getContext('2d');
  pCtx.drawImage(offscreen, 0, 0);

  // Update meta panel
  if (locationData) {
    document.getElementById('meta-addr').textContent = locationData.addr;
    document.getElementById('meta-maps').textContent = `maps.google.com?q=${locationData.lat.toFixed(5)},${locationData.lon.toFixed(5)}`;
  }
  document.getElementById('meta-time').textContent = new Date().toLocaleString();

  // Convert to blob
  offscreen.toBlob(b => { capturedBlob = b; }, 'image/jpeg', 0.92);

  showScreen('preview');
}

function drawStamp(ctx, w, h) {
  const loc = locationData;
  const now = new Date();
  const lines = [
    loc ? loc.addr : 'GPS unavailable',
    loc ? `maps.google.com?q=${loc.lat.toFixed(5)},${loc.lon.toFixed(5)}` : '',
    now.toLocaleString()
  ].filter(Boolean);

  const pad = 14;
  const lineH = Math.round(h * 0.022);
  const fontSize = lineH;
  ctx.font = `${fontSize}px JetBrains Mono, monospace`;

  // Measure widest line
  let maxW = 0;
  lines.forEach(l => { const m = ctx.measureText(l); if (m.width > maxW) maxW = m.width; });

  const boxW = maxW + pad * 2;
  const boxH = lines.length * (lineH + 6) + pad * 1.5;
  const x = w - boxW - 16;
  const y = h - boxH - 16;

  // Background
  ctx.save();
  ctx.globalAlpha = 0.75;
  ctx.fillStyle = '#000';
  roundRect(ctx, x, y, boxW, boxH, 10);
  ctx.globalAlpha = 1;

  // Accent line left
  ctx.fillStyle = '#00e5a0';
  ctx.fillRect(x + 6, y + 10, 3, boxH - 20);

  // Text
  ctx.fillStyle = '#00e5a0';
  ctx.font = `bold ${fontSize}px JetBrains Mono, monospace`;
  ctx.fillText(lines[0], x + pad + 4, y + pad + lineH);

  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.font = `${fontSize * 0.88}px Inter, sans-serif`;
  lines.slice(1).forEach((line, i) => {
    ctx.fillText(line, x + pad + 4, y + pad + lineH + (i + 1) * (lineH + 6));
  });

  ctx.restore();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

// ── RETAKE ──
document.getElementById('retake-btn').addEventListener('click', () => {
  if (!stream) startCamera();
  showScreen('camera');
});

// ── SAVE ──
document.getElementById('save-btn').addEventListener('click', () => {
  if (!capturedBlob) return;
  const url = URL.createObjectURL(capturedBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `locsnap_${Date.now()}.jpg`;
  a.click();
  URL.revokeObjectURL(url);
  showStatus('📥 Photo saved!');
});

// ── NATIVE SHARE ──
document.getElementById('native-share-btn').addEventListener('click', nativeShare);

async function nativeShare() {
  if (!capturedBlob) return;
  if (!navigator.share) {
    showStatus('Sharing not supported in this browser. Use the buttons below.', true);
    return;
  }
  const file = new File([capturedBlob], `locsnap_${Date.now()}.jpg`, { type: 'image/jpeg' });
  const loc = locationData;
  const text = loc
    ? `📍 ${loc.addr}\n🗺️ https://www.google.com/maps?q=${loc.lat},${loc.lon}\n🕐 ${loc.timeStr}`
    : `📸 Photo taken at ${new Date().toLocaleString()}`;
  try {
    await navigator.share({ files: [file], title: 'LocSnap Photo', text });
  } catch (e) {
    if (e.name !== 'AbortError') showStatus('Could not open share sheet.', true);
  }
}

// ── APP-SPECIFIC SHARE ──
document.querySelectorAll('.share-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const app = btn.dataset.app;
    const loc = locationData;
    const text = encodeURIComponent(loc
      ? `📍 ${loc.addr}\n🗺️ https://www.google.com/maps?q=${loc.lat},${loc.lon}\n🕐 ${loc.timeStr}`
      : `📸 Photo from LocSnap – ${new Date().toLocaleString()}`);

    // Try Web Share API first (passes the actual image)
    if (navigator.share && capturedBlob) {
      const file = new File([capturedBlob], `locsnap_${Date.now()}.jpg`, { type: 'image/jpeg' });
      try {
        await navigator.share({ files: [file], title: 'LocSnap', text: decodeURIComponent(text) });
        return;
      } catch(e) {
        if (e.name === 'AbortError') return;
      }
    }

    // Google Maps — open location directly
    if (app === 'maps') {
      const loc = locationData;
      if (loc) {
        window.open(`https://www.google.com/maps?q=${loc.lat},${loc.lon}`, '_blank');
      } else {
        showStatus('GPS not available yet.', true);
      }
      return;
    }

    // Fallback deep links (text only on desktop)
    const urls = {
      whatsapp:   `https://wa.me/?text=${text}`,
      telegram:   `https://t.me/share/url?url=locsnap&text=${text}`,
      messenger:  `fb-messenger://share?link=locsnap&app_id=123456`,
      instagram:  `instagram://`,
      sms:        `sms:?body=${text}`,
      email:      `mailto:?subject=LocSnap%20Photo&body=${text}`
    };
    if (urls[app]) window.open(urls[app], '_blank');
    showStatus('Opening ' + btn.querySelector('.share-btn-label').textContent + '…', false, 2000);
  });
});
</script>
</body>
</html>
